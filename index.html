<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0c10">
    <title>FW Company - Relatório de Atividades de Campo</title>
    <link rel="icon" type="image/x-icon" href="fw_mini2.ico">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- PDF.js para visualização de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0c10;
            min-height: 100vh;
            color: #e1e9f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d3748;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #2d3748;
        }

        .sidebar-header img {
            width: 160px;
            height: 95px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .sidebar-header h3 {
            font-size: 14px;
            font-weight: 300;
            color: #94a3b8;
        }

        .sidebar-menu {
            flex: 1;
            padding: 20px 10px;
            overflow-y: auto;
        }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }

        .menu-item i {
            font-size: 20px;
            width: 24px;
        }

        .menu-item:hover {
            background: #1e293b;
            color: #60a5fa;
        }

        .menu-item.active {
            background: #1e293b;
            color: #60a5fa;
            border-left: 3px solid #3b82f6;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #2d3748;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .sidebar-footer img {
            height: 35px;
            width: auto;
            object-fit: contain;
            opacity: 0.8;
            transition: all 0.3s;
        }

        .sidebar-footer img:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0a0c10;
        }

        .top-bar {
            background: #1a1f2b;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2d3748;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            color: #60a5fa;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            background: #1e293b;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #60a5fa;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        /* Cards */
        .card {
            background: #1a1f2b;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #2d3748;
            margin-bottom: 20px;
            animation: slideInUp 0.5s ease;
            animation-fill-mode: both;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2d3748;
        }

        .card-header h2 {
            font-size: 16px;
            color: #60a5fa;
            font-weight: 600;
        }

        .badge {
            background: #1e293b;
            color: #60a5fa;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #3b82f6;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 14px;
            color: #e1e9f0;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        select.form-control option {
            background: #1e293b;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #059669;
            color: white;
        }

        .btn-success:hover {
            background: #047857;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* Photo buttons */
        .photo-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .photo-btn {
            flex: 1;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
            border: 1px solid #334155;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-preview .remove-image {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        /* Report card */
        .report-card {
            background: #1e293b;
            border-left: 4px solid #8e44ad;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .report-card:hover {
            transform: translateY(-2px);
            background: #2d3748;
        }

        .report-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
        }

        .report-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .report-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .report-action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .report-action-btn.view {
            background: #3b82f6;
            color: white;
        }

        .report-action-btn.edit {
            background: #f59e0b;
            color: white;
        }

        .report-action-btn.delete {
            background: #dc2626;
            color: white;
        }
        
        .report-action-btn.download {
            background: #10b981;
            color: white;
        }

        /* Document card - VERSÃO MAIS FINA (altura reduzida) */
        .doc-card {
            background: #1e293b;
            border-left: 4px solid #10b981;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .doc-card:hover {
            transform: translateY(-2px);
            background: #2d3748;
        }

        .doc-header {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .doc-icon {
            width: 40px;
            height: 40px;
            background: #0f172a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .doc-info {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .doc-info h4 {
            font-size: 14px;
            margin: 0;
        }

        .doc-info p {
            font-size: 11px;
            color: #64748b;
            margin: 0;
        }

        .doc-actions {
            display: flex;
            gap: 8px;
        }

        /* Login Screen */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: #1a1f2b;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid #2d3748;
        }

        .login-box h2 {
            color: #60a5fa;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-box p {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .login-logos img {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        /* Stats cards */
        .stat-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #60a5fa;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1f2b;
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #2d3748;
        }

        .modal-content h3 {
            color: #60a5fa;
            margin-bottom: 20px;
        }

        /* Modal para visualização de PDF - tamanho maior */
        .pdf-modal-content {
            max-width: 90vw;
            width: 90%;
            max-height: 90vh;
        }

        .pdf-viewer {
            width: 100%;
            height: 70vh;
            border: none;
            border-radius: 8px;
            background: #fff;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s;
            border-left: 4px solid #3b82f6;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left-color: #10b981;
        }

        .notification.error {
            border-left-color: #ef4444;
        }

        .notification.warning {
            border-left-color: #f59e0b;
        }

        /* Daily limit warning */
        .daily-limit-warning {
            background: #f59e0b;
            color: #1e293b;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Progress bar */
        .progress {
            background: #334155;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar {
            background: #8e44ad;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-bar input {
            flex: 1;
        }

        .load-more-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>

<body>

        <div class="sidebar-footer">
            <img src="Delservin LOGO.png" alt="Delservin" onerror="this.style.display='none'">
            <img src="Altercon LOGO.png" alt="Altercon" onerror="this.style.display='none'">
        </div>

    <div class="main-content" id="mainContent" style="display: none;">
        <div class="top-bar">
            <div class="page-title" id="pageTitle">Dashboard</div>
            <div class="user-info">
                <span class="user-badge" id="userBadge">USUÁRIO</span>

                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>

        <div id="contentArea"></div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <span id="notificationMsg"></span>

    <!-- Modals -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <h3>Detalhes do Relatório</h3>
            <div id="detailModalBody"></div>
            <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="closeModal('detailModal')">Fechar</button>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3>Editar Relatório</h3>
            <div id="editModalBody"></div>
        </div>
    </div>

    <div class="modal-overlay" id="imageModal">
        <div class="modal-content" style="max-width: 90vw;">
            <h3>Foto do Relatório</h3>
            <img id="modalImage" style="width: 100%; border-radius: 8px; margin: 15px 0;">
            <button class="btn btn-primary" id="downloadModalImageBtn" style="width: 100%; margin-bottom: 10px;"><i class="fas fa-download"></i> Baixar Foto</button>
            <button class="btn btn-primary" style="width: 100%;" onclick="closeModal('imageModal')">Fechar</button>

    </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="pdfModalTitle">Visualizar Documento</h3>
                <button class="btn btn-danger" style="padding: 8px 16px;" onclick="closeModal('pdfModal')">
                    <i class="fas fa-times"></i> Fechar

            window.downloadImage = function(imageUrl, filename = 'foto_relatorio.jpg') {
                if (!imageUrl) {
                    showNotification('Nenhuma imagem disponível para download', 'error');
                    return;
                }
                fetch(imageUrl)
                    .then(response => response.blob())
                    .then(blob => {
                        const link = document.createElement('a');
                        const objectUrl = URL.createObjectURL(blob);
                        link.href = objectUrl;
                        link.download = filename;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(objectUrl);
                        showNotification('Download iniciado!', 'success');
                    })
                    .catch(error => {
                        console.error('Erro ao baixar imagem:', error);
                        showNotification('Erro ao baixar imagem', 'error');
                    });
            };

            // FUNÇÃO PARA VISUALIZAR DOCUMENTO (PDF ou imagem)
            window.viewDocument = function(fileUrl, fileName) {
                if (!fileUrl) {
                    showNotification('Documento indisponível', 'error');
                    return;
                }
                
                const modal = document.getElementById('pdfModal');
                const viewer = document.getElementById('pdfViewer');
                const title = document.getElementById('pdfModalTitle');
                const downloadBtn = document.getElementById('pdfDownloadBtn');
                
                title.textContent = `Visualizando: ${fileName}`;
                
                // Verificar se é PDF ou imagem
                const isPdf = fileName.toLowerCase().endsWith('.pdf');
                const isImage = fileName.match(/\.(jpg|jpeg|png|gif|bmp|webp)$/i);
                
                if (isPdf) {
                    // Para PDF, usar o iframe
                    viewer.src = fileUrl;
                    viewer.style.display = 'block';
                } else if (isImage) {
                    // Para imagens, mostrar no iframe também funciona, mas vamos substituir por img
                    viewer.src = fileUrl;
                    viewer.style.display = 'block';
                } else {
                    // Outros tipos, mostrar mensagem e oferecer download
                    viewer.style.display = 'none';
                    alert('Este tipo de arquivo não pode ser visualizado diretamente. Clique em "Baixar" para fazer o download.');
                }
                
                // Configurar botão de download
                downloadBtn.onclick = () => downloadDocument(fileUrl, fileName);
                
                modal.style.display = 'flex';
            };
            
            async function uploadDocument(file, docType, description) {
                try {
                    const client = getSupabaseClient();
                    
                    const base64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                    });
                    
                    const docData = {
                        user_id: currentUser.id,
                        user_name: currentUser.name,
                        user_email: currentUser.email,
                        doc_type: docType,
                        description: description || '',
                        file_name: file.name,
                        file_type: file.type,
                        file_url: base64,
                        file_size: file.size,
                        created_at: new Date().toISOString()
                    };
                    
                    const { data, error } = await client
                        .from('docs_sistema_de_campo')
                        .insert([docData])
                        .select();
                    
                    if (error) throw error;
                    showNotification('Documento enviado com sucesso!', 'success');
                    return data[0];
                } catch (error) {
                    showNotification('Erro ao enviar documento: ' + error.message, 'error');
                    return null;
                }
            }
            
            async function loadDocuments(reset = true, filterType = '') {
                if (reset) {
                    currentDocPage = 0;
                    documents = [];
                    hasMoreDocs = true;
                }
                if (!hasMoreDocs && !reset) return;
                
                showLoading(true);
                try {
                    const client = getSupabaseClient();
                    let query = client
                        .from('docs_sistema_de_campo')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .range(currentDocPage * PAGE_SIZE, (currentDocPage + 1) * PAGE_SIZE - 1);
                    
                    if (filterType) query = query.eq('doc_type', filterType);
                    
                    const { data, error } = await query;
                    if (error) throw error;
                    
                    if (reset) documents = data || [];
                    else documents = [...documents, ...(data || [])];
                    
                    hasMoreDocs = (data || []).length === PAGE_SIZE;
                    if (hasMoreDocs) currentDocPage++;
                    
                    renderDocumentsList();
                    
                    const loadMoreDocContainer = document.getElementById('loadMoreDocContainer');
                    if (loadMoreDocContainer) {
                        loadMoreDocContainer.style.display = hasMoreDocs && (data || []).length > 0 ? 'block' : 'none';
                    }
                } catch (error) {
                    showNotification('Erro ao carregar documentos', 'error');
                } finally {
                    showLoading(false);
                }
            }
            
            async function deleteDocument(docId) {
                if (!confirm('Tem certeza que deseja excluir este documento?')) return false;
                
                try {
                    const client = getSupabaseClient();
                    const { error } = await client
                        .from('docs_sistema_de_campo')
                        .delete()
                        .eq('id', docId);
                    
                    if (error) throw error;
                    showNotification('Documento excluído!', 'success');
                    return true;
                } catch (error) {
                    showNotification('Erro ao excluir: ' + error.message, 'error');
                    return false;
                }
            }
            
            window.downloadDocument = function(fileUrl, fileName) {
                if (!fileUrl) {
                    showNotification('Documento indisponível', 'error');
                    return;
                }
                
                if (fileUrl.startsWith('data:')) {
                    const link = document.createElement('a');
                    link.href = fileUrl;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showNotification('Download iniciado!', 'success');
                } else {
                    fetch(fileUrl)
                        .then(response => response.blob())
                        .then(blob => {
                            const link = document.createElement('a');
                            const objectUrl = URL.createObjectURL(blob);
                            link.href = objectUrl;
                            link.download = fileName;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            URL.revokeObjectURL(objectUrl);
                            showNotification('Download iniciado!', 'success');
                        })
                        .catch(error => {
                            console.error('Erro ao baixar:', error);
                            showNotification('Erro ao baixar documento', 'error');
                        });
                }
            };

            function setupDocumentosEvents() {
                const uploadForm = document.getElementById('uploadDocForm');
                if (uploadForm) {
                    uploadForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const docType = document.getElementById('docType').value;
                        const description = document.getElementById('docDescription').value;
                        const fileInput = document.getElementById('docFile');
                        
                        if (!docType || !fileInput.files[0]) {
                            showNotification('Selecione o tipo e o arquivo', 'error');
                            return;
                        }
                        
                        showLoading(true);
                        const result = await uploadDocument(fileInput.files[0], docType, description);
                        showLoading(false);
                        
                        if (result) {
                            document.getElementById('uploadDocForm').reset();
                            await loadDocuments(true, currentDocFilter);
                        }
                    });
                }
                
                const filterDocType = document.getElementById('filterDocType');
                if (filterDocType) {
                    filterDocType.addEventListener('change', (e) => {
                        currentDocFilter = e.target.value;
                        loadDocuments(true, currentDocFilter);
                    });
                }
                
                const clearDocFilterBtn = document.getElementById('clearDocFilterBtn');
                if (clearDocFilterBtn) {
                    clearDocFilterBtn.addEventListener('click', () => {
                        if (filterDocType) filterDocType.value = '';
                        currentDocFilter = '';
                        loadDocuments(true, '');
                    });
                }
                
                const loadMoreDocBtn = document.getElementById('loadMoreDocBtn');
                if (loadMoreDocBtn) {
                    loadMoreDocBtn.addEventListener('click', () => loadDocuments(false, currentDocFilter));
                }
            }

            function getSupabaseClient() {
                if (supabaseClient) return supabaseClient;
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false },
                    db: { schema: 'public' }
                });
                return supabaseClient;
            }

            function showNotification(message, type = 'info') {
                const notification = document.getElementById('notification');
                const msgSpan = document.getElementById('notificationMsg');
                const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
                msgSpan.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
                notification.className = `notification ${type} show`;
                setTimeout(() => notification.classList.remove('show'), 4000);
            }

            function showLoading(show) {
                document.getElementById('loading').style.display = show ? 'flex' : 'none';
            }

                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                });
            }

                if (reset) {

                    reports = [];
                    hasMore = true;
                }
                if (!hasMore && !reset) return;

                showLoading(true);
                try {
                    const client = getSupabaseClient();
                    let query = client
                        .from('Relatório de atividades de campo')
                        .select('*')
                        .order('report_date', { ascending: false })
                        .order('created_at', { ascending: false })
                        .range(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE - 1);

                    if (!isAdminViewAll && currentUser.role !== 'admin') {
                        query = query.eq('user_id', currentUser.id);
                    }
                    if (filterDate) query = query.eq('report_date', filterDate);

                    const { data, error } = await query;
                    if (error) throw error;

                    if (reset) reports = data || [];
                    else reports = [...reports, ...(data || [])];

                    hasMore = (data || []).length === PAGE_SIZE;
                    if (hasMore) currentPage++;

                    renderReportsList();
                    updateStats();
                    const loadMoreContainer = document.getElementById('loadMoreContainer');
                    if (loadMoreContainer) {
                        loadMoreContainer.style.display = hasMore && (data || []).length > 0 ? 'block' : 'none';

                } catch (error) {
                    showNotification('Erro ao carregar relatórios', 'error');
                } finally {
                    showLoading(false);
                }
            }

            window.submitEdit = async function(reportId) {
                const date = document.getElementById('editReportDate').value;
                const location = document.getElementById('editLocation').value;
                const activityType = document.getElementById('editType').value;
                const description = document.getElementById('editDescription').value.trim();
                const imageBase64 = document.getElementById('editImageBase64').value || null;

                if (!date || !location || !activityType || !description) {
                    showNotification('Preencha todos os campos', 'error');
                    return;
                }

                showLoading(true);
                const success = await updateReport(reportId, { date, location, activityType, description, imageBase64 });
                showLoading(false);

                if (success) {
                    closeModal('editModal');
                    await loadReports(true, currentFilterDate);
                    updateStats();
                }
            };

                document.getElementById('editImagePreview').style.display = 'none';

                document.getElementById('editImageInput').value = '';

            async function updateStats() {
                const client = getSupabaseClient();
                let query = client.from('Relatório de atividades de campo').select('activity_type, report_date');
                if (currentUser.role !== 'admin') {
                    query = query.eq('user_id', currentUser.id);
                }
                const { data } = await query;
                const total = data?.length || 0;
                const totalCountEl = document.getElementById('totalCount');
                if (totalCountEl) totalCountEl.textContent = total;

                const today = new Date().toISOString().split('T')[0];
                const todayCount = data?.filter(item => item.report_date === today).length || 0;
                const todayCountEl = document.getElementById('todayCount');
                if (todayCountEl) todayCountEl.textContent = todayCount;

                const typeCount = {};
                data?.forEach(item => {
                    typeCount[item.activity_type] = (typeCount[item.activity_type] || 0) + 1;
                });

                let typeHtml = '';
                for (const [type, count] of Object.entries(typeCount)) {
                    const percent = total ? Math.round((count / total) * 100) : 0;
                    const iconHtml = getActivityIcon(type);
                    const badgeColor = getActivityBadgeColor(type);
                    typeHtml += `
                        <div style="margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span><span style="color: ${badgeColor};">${iconHtml}</span> ${escapeHtml(type)}</span>
                                <span>${count} (${percent}%)</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar" style="width: ${percent}%; background: ${badgeColor};"></div>
                            </div>
                        </div>
                    `;
                }
                const typeStatsEl = document.getElementById('typeStats');
                if (typeStatsEl) typeStatsEl.innerHTML = typeHtml || '<p>Nenhum dado ainda</p>';
            }

            async function updateTodayCount() {
                const count = await getTodayReportsCount();
                const warningDiv = document.getElementById('dailyLimitWarning');
                const submitBtn = document.getElementById('submitReportBtn');
                if (warningDiv) warningDiv.style.display = count >= 10 ? 'block' : 'none';
                if (submitBtn) {
                    submitBtn.disabled = count >= 10;
                    submitBtn.style.opacity = count >= 10 ? '0.5' : '1';
                }
            }

            async function submitReport(event) {
                event.preventDefault();
                if (await getTodayReportsCount() >= 10) {
                    showNotification('Limite de 10 relatórios por dia atingido!', 'warning');
                    return;
                }

                const date = document.getElementById('reportDate').value;
                const location = document.getElementById('reportLocation').value;
                const activityType = document.getElementById('reportType').value;
                const description = document.getElementById('reportDescription').value.trim();

                if (!date || !location || !activityType || !description) {
                    showNotification('Preencha todos os campos', 'error');
                    return;
                }

                showLoading(true);
                const result = await saveReport({
                    date, location, activityType, description,
                    imageBase64: currentImageBase64
                });
                showLoading(false);

                if (result) {
                    document.getElementById('reportForm').reset();
                    removeImage();
                    const dateInput = document.getElementById('reportDate');
                    if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];
                    await loadReports(true, currentFilterDate);
                    updateTodayCount();
                    updateStats();
                    showNotification('Relatório salvo!', 'success');
                }
            }

            async function handleLogin() {
                const username = document.getElementById('loginUser').value.trim();
                const password = document.getElementById('loginPassword').value;

                if (!username || !password) {
                    showNotification('Preencha usuário e senha', 'error');
                    return;
                }

                const btn = document.getElementById('loginBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
                btn.disabled = true;

                try {
                    const client = getSupabaseClient();
                    const { data: usersData } = await client
                        .from('users')
                        .select('id, username, password, full_name, role')
                        .eq('username', username);

                    const user = usersData?.[0];

                    if (user && user.password === password) {
                        currentUser = {
                            id: user.id,
                            username: user.username,
                            name: user.full_name || user.username.split('@')[0],
                            email: user.username,
                            role: user.role || 'user'
                        };
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));

                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('sidebar').style.display = 'flex';
                        document.getElementById('mainContent').style.display = 'block';
                        document.getElementById('userBadge').innerHTML = (currentUser.role?.toUpperCase() || 'USER');
                        document.getElementById('userName').textContent = currentUser.name;

                        const dateInput = document.getElementById('reportDate');
                        if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];

                        await loadReports(true);
                        updateTodayCount();
                        updateStats();
                        await loadDocuments(true, '');
                        loadPage('dashboard');
                        showNotification(`Bem-vindo, ${currentUser.name}!`, 'success');
                    } else {
                        showNotification('Usuário ou senha inválidos', 'error');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    showNotification('Erro ao conectar com o servidor', 'error');
                } finally {
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                    btn.disabled = false;
                }
            }

            function loadPage(page) {
                const contentArea = document.getElementById('contentArea');
                const titles = {
                    dashboard: 'Dashboard',
                    novo: 'Novo Relatório',
                    historico: 'Histórico',
                    documentos: 'Documentos'
                };
                document.getElementById('pageTitle').textContent = titles[page] || 'Dashboard';

                switch (page) {
                    case 'dashboard':
                        contentArea.innerHTML = renderDashboard();
                        setTimeout(() => {
                            updateStats();
                            const recentContainer = document.getElementById('recentReportsList');
                            if (recentContainer && reports.length > 0) {
                                recentContainer.innerHTML = reports.slice(0, 5).map(r => {
                                    const iconHtml = getActivityIcon(r.activity_type);
                                    const badgeColor = getActivityBadgeColor(r.activity_type);
                                    return `
                                        <div style="padding: 10px; border-bottom: 1px solid #2d3748;">
                                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                                <span><strong>${escapeHtml(r.location)}</strong></span>
                                                <span class="badge" style="background: ${badgeColor}20; border-color: ${badgeColor}; color: ${badgeColor};">${iconHtml} ${escapeHtml(r.activity_type)}</span>

                                            <p style="font-size:12px; color:#64748b; margin-top:5px;">${formatDate(r.report_date)}</p>

                                    `;
                                }).join('');
                            } else if (recentContainer) {
                                recentContainer.innerHTML = '<p style="text-align:center; color:#64748b; padding:20px;">Nenhum relatório encontrado</p>';
                            }
                        }, 100);
                        break;
                    case 'novo':
                        contentArea.innerHTML = renderNovoRelatorio();
                        setupFormEvents();
                        updateTodayCount();
                        break;
                    case 'historico':
                        contentArea.innerHTML = renderHistorico();
                        setupHistoryEvents();
                        loadReports(true, currentFilterDate);
                        break;
                    case 'documentos':
                        contentArea.innerHTML = renderDocumentos();
                        setupDocumentosEvents();
                        loadDocuments(true, currentDocFilter);
                        break;
                }
            }

            function setupFormEvents() {
                const fileInput = document.getElementById('reportImage');
                const uploadBtn = document.getElementById('uploadPhotoBtn');
                const takeBtn = document.getElementById('takePhotoBtn');
                if (uploadBtn) uploadBtn.addEventListener('click', () => fileInput.click());
                if (takeBtn) {
                    takeBtn.addEventListener('click', () => {
                        fileInput.setAttribute('capture', 'environment');
                        fileInput.click();
                        setTimeout(() => fileInput.removeAttribute('capture'), 500);
                    });
                }
                if (fileInput) {
                    fileInput.addEventListener('change', async (e) => {
                        if (e.target.files[0]) {
                            currentImageBase64 = await imageToBase64(e.target.files[0]);
                            document.getElementById('previewImg').src = currentImageBase64;
                            document.getElementById('imagePreview').style.display = 'block';
                        }
                    });
                }
                const reportForm = document.getElementById('reportForm');
                if (reportForm) reportForm.addEventListener('submit', submitReport);
            }

            function setupHistoryEvents() {
                const filterDate = document.getElementById('filterDate');
                const clearBtn = document.getElementById('clearFilterBtn');
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                const toggleBtn = document.getElementById('toggleAdminViewBtn');

                if (filterDate) {
                    filterDate.addEventListener('change', (e) => {
                        currentFilterDate = e.target.value;
                        loadReports(true, currentFilterDate);
                    });
                }
                if (clearBtn) {
                    clearBtn.addEventListener('click', () => {
                        if (filterDate) filterDate.value = '';
                        currentFilterDate = '';
                        loadReports(true, '');
                    });
                }
                if (loadMoreBtn) {
                    loadMoreBtn.addEventListener('click', () => loadReports(false, currentFilterDate));
                }
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', () => {
                        isAdminViewAll = !isAdminViewAll;
                        toggleBtn.innerHTML = `<i class="fas fa-eye"></i> ${isAdminViewAll ? 'Meus Relatórios' : 'Ver Todos'}`;
                        loadReports(true, currentFilterDate);
                        showNotification(isAdminViewAll ? 'Exibindo todos os relatórios' : 'Exibindo apenas seus relatórios', 'info');
                    });
                }
            }

            function initMenu() {
                document.querySelectorAll('.menu-item').forEach(item => {
                    item.addEventListener('click', () => {
                        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                        item.classList.add('active');
                        loadPage(item.dataset.page);
                    });
                });
            }

            async function checkSavedSession() {
                const saved = localStorage.getItem('currentUser');
                if (saved) {
                    try {
                        currentUser = JSON.parse(saved);
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('sidebar').style.display = 'flex';
                        document.getElementById('mainContent').style.display = 'block';
                        document.getElementById('userBadge').innerHTML = (currentUser.role?.toUpperCase() || 'USER');
                        document.getElementById('userName').textContent = currentUser.name;
                        await loadReports(true);
                        updateTodayCount();
                        updateStats();
                        await loadDocuments(true, '');
                        loadPage('dashboard');
                        showNotification(`Bem-vindo, ${currentUser.name}!`, 'success');
                    } catch (e) {
                        console.error('Error restoring session:', e);
                    }
                }
            }

                initMenu();
                document.getElementById('logoutBtn').addEventListener('click', logout);
                document.getElementById('loginBtn').addEventListener('click', handleLogin);
                await checkSavedSession();
                document.getElementById('loading').style.display = 'none';
            }

            init();
        })();
    </script>
</body>

</html>
